name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - '.github/workflows/ci.yml'
      - 'app/**'
      - 'tests/**'
      - 'alembic/**'
      - 'frontend/**'
      - 'pyproject.toml'
      - 'alembic.ini'

jobs:
  backend-fast:
    name: Backend Fast Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Import backend smoke check
        run:
          python -c "import app.main, app.registry, app.config,
          app.tasks.document_tasks, app.tasks.page_tasks; print('imports ok')"

      - name: Run isolated unit tests
        run: python -m pytest --confcutdir=tests/unit tests/unit

  backend-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-fast

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: scandoc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d postgres" --health-interval 10s
          --health-timeout 5s --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run integration tests
        run: python -m pytest tests/integration

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
